<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-title" content="Monopoly Tracker">
<meta name="theme-color" content="#111827"><link rel="manifest" href="/manifest.json"><link rel="apple-touch-icon" href="/icon.png"><link rel="icon" href="/icon.png"><title>Monopoly Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{color-scheme:light dark;--bg:#f6f7fb;--card:#fff;--text:#111827;--muted:#6b7280;--line:#e5e7eb;--soft:#f3f4f6;--accent:#111827;--good:#047857;--bad:#b91c1c;--warn:#b45309;--shadow:#0000000a}
@media(prefers-color-scheme:dark){:root{--bg:#0b1020;--card:#141a2a;--text:#f9fafb;--muted:#9ca3af;--line:#2b3447;--soft:#1f2937;--accent:#f9fafb;--good:#6ee7b7;--bad:#fca5a5;--warn:#fcd34d;--shadow:#00000030}}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}header{position:sticky;top:0;z-index:5;padding:12px 14px 9px;background:color-mix(in srgb,var(--bg) 92%,transparent);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}h1{font-size:1.15rem;margin:0}.sub{font-size:.78rem;color:var(--muted);margin-top:2px}main{max-width:1180px;margin:auto;padding:12px 12px 86px}.view{display:grid;gap:12px}.hidden{display:none!important}section,.panel{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:13px;box-shadow:0 8px 24px var(--shadow)}h2{font-size:1rem;margin:0 0 10px}.section-head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}.mini{font-size:.78rem;color:var(--muted)}label{display:block;margin:8px 0 4px;font-size:.74rem;color:var(--muted)}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:12px;background:var(--soft);color:var(--text);padding:10px 11px;font-size:1rem}textarea{min-height:90px}button{border:0;border-radius:12px;background:var(--accent);color:var(--bg);padding:10px 11px;font-weight:750}.secondary{background:var(--soft);color:var(--text);border:1px solid var(--line)}.danger{background:#fee2e2;color:#991b1b;border:1px solid #fecaca}.tiny{padding:7px 9px;font-size:.78rem}.row{display:flex;gap:8px}.row>*{flex:1}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.actions>*{flex:1 1 auto}.cards,.list{display:grid;gap:8px}.card,.prop{background:var(--soft);border:1px solid var(--line);border-radius:14px;padding:11px}.card{display:grid;grid-template-columns:1fr auto;align-items:center;gap:8px}.name{font-weight:850}.cash{font-size:1.18rem;font-weight:900}.pill{display:inline-block;margin:2px 3px 2px 0;padding:4px 8px;border:1px solid var(--line);border-radius:999px;font-size:.75rem;color:var(--muted);background:color-mix(in srgb,var(--card) 50%,transparent)}.good{color:var(--good);font-weight:800}.bad{color:var(--bad);font-weight:800}.warn{color:var(--warn);font-weight:800}.muted{color:var(--muted)}.prophead{display:grid;grid-template-columns:1fr auto;gap:8px;margin-bottom:6px}.tabs{position:fixed;left:0;right:0;bottom:0;display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:8px;background:color-mix(in srgb,var(--card) 94%,transparent);backdrop-filter:blur(12px);border-top:1px solid var(--line)}.tabs button{background:var(--soft);color:var(--text);border:1px solid var(--line);font-size:.82rem;padding:10px 4px}.tabs .active{background:var(--accent);color:var(--bg)}details{margin-top:8px;border:1px solid var(--line);border-radius:12px;padding:8px 10px;background:color-mix(in srgb,var(--card) 45%,transparent)}summary{font-weight:800;cursor:pointer}.rent-grid{display:grid;grid-template-columns:1fr auto;gap:5px;margin-top:8px;font-size:.85rem}.rent-grid div:nth-child(even){font-weight:850}.empty{padding:15px;border:1px dashed var(--line);border-radius:14px;background:var(--soft);color:var(--muted);text-align:center}.status-dot{display:inline-block;width:.65em;height:.65em;border-radius:50%;background:var(--bad);margin-right:4px}.status-dot.on{background:var(--good)}
@media(min-width:900px) and (orientation:landscape){main{padding-bottom:20px}.wide{grid-template-columns:1fr 1fr}.full{grid-column:1/-1}.list{grid-template-columns:1fr 1fr}.tabs{position:sticky;bottom:0;max-width:1180px;margin:auto;border-left:1px solid var(--line);border-right:1px solid var(--line);border-radius:16px 16px 0 0}.player-wallets{grid-template-columns:1fr 1fr}}
@media(max-width:560px){.row{flex-direction:column}.card,.prophead{grid-template-columns:1fr}.actions button{min-width:46%}main{padding-left:10px;padding-right:10px}}
</style>
</head>
<body>
<header><h1>Monopoly Tracker</h1><div class="sub">Player-first game table, shared cash, properties, cards and log.</div></header>
<main>
<div id="v-game" class="view wide">
<section class="full"><div class="section-head"><div><h2>Game</h2><div class="mini" id="boardLabel"></div><div class="mini" id="cloudLabel"></div></div><button class="secondary" onclick="view('more')">More</button></div></section>
<section><h2>Players at table</h2><div id="gamePlayers" class="cards"></div></section>
<section><h2>Buy / Allocate Property</h2><div class="row"><div><label>Player</label><select id="buyPlayer"></select></div><div><label>Unowned property</label><select id="buyProperty"></select></div></div><div id="buyPreview" class="panel" style="margin-top:10px"></div><div class="actions"><button onclick="buySelectedProperty()">Buy Property</button><button class="secondary" onclick="assignSelectedProperty()">Assign Free</button></div></section>
<section><h2>Pay Rent</h2><div class="row"><div><label>Payer</label><select id="rentPayer" onchange="rentPreview()"></select></div><div><label>Property</label><select id="rentProp" onchange="rentPreview()"></select></div></div><div id="rentBox" class="panel" style="margin-top:10px"></div><div class="actions"><button onclick="payRent()">Pay Rent</button></div></section>
<section><h2>Card / Special Action</h2><label>Player affected</label><select id="cardPlayer"></select><label>Action</label><select id="cardAction" onchange="previewCard()"></select><div id="cardPreview" class="panel" style="margin-top:10px"></div><div class="actions"><button onclick="applyCard()">Apply & Log</button></div></section>
<section class="full"><h2>Recent Game Log</h2><div id="log" class="cards"></div></section>
</div>
<div id="v-players" class="view hidden"><section><h2>Add Player</h2><label>Name</label><input id="newName" placeholder="e.g. Sam"><label>Starting Cash</label><input id="newCash" type="number" value="1500"><div class="actions"><button onclick="addPlayer()">Add Player</button></div></section><section><h2>Player Wallets</h2><div id="playerWallets" class="cards player-wallets"></div></section></div>
<div id="v-properties" class="view hidden"><section><h2>Properties</h2><label>Search</label><input id="search" placeholder="Search property, owner, mortgaged..." oninput="render()"><div id="props" class="list" style="margin-top:10px"></div></section></div>
<div id="v-more" class="view hidden wide"><section><h2>Board & Cloud</h2><label>Board preset</label><div class="row"><select id="presetSelect"></select><button onclick="applyPreset()">Use</button></div><label>Supabase URL</label><input id="sbUrl" placeholder="https://xxxx.supabase.co"><label>Supabase publishable / anon key</label><input id="sbKey" placeholder="sb_publishable... or anon key"><label>Game code</label><input id="gameCode" placeholder="e.g. KANTO-001"><div class="actions"><button onclick="connectCloud()">Connect / Join</button><button class="secondary" onclick="pushCloud()">Push</button><button class="secondary" onclick="pullCloud()">Pull</button><button class="danger" onclick="disconnectCloud()">Disconnect</button></div><div id="cloudMsg" class="mini" style="margin-top:10px"></div></section><section><h2>Data</h2><div class="actions"><button onclick="exportGame()">Export JSON</button><button class="secondary" onclick="copyGame()">Copy JSON</button><button class="danger" onclick="resetAll()">Reset Game</button></div><label>Import JSON</label><textarea id="importText"></textarea><div class="actions"><button onclick="importGame()">Import</button></div><label>Current JSON</label><textarea id="json" readonly></textarea></section></div>
</main>
<nav class="tabs"><button id="t-game" class="active" onclick="view('game')">Game</button><button id="t-players" onclick="view('players')">Players</button><button id="t-properties" onclick="view('properties')">Properties</button><button id="t-more" onclick="view('more')">More</button></nav>
<script>
const KEY="monopolyTracker.v6",CLOUDKEY="monopolyTracker.cloud";
const groupEmoji={"Brown":"🟫","Light Blue":"🩵","Pink":"🩷","Orange":"🟧","Red":"🟥","Yellow":"🟨","Green":"🟩","Dark Blue":"🟦","Railroad":"🚆","Utility":"💡","Pallet / Viridian":"🟫","Pewter / Cerulean":"🩵","Vermilion Route":"🩷","Lavender / Celadon":"🟧","Fuchsia Route":"🟥","Island Arc":"🟨","Saffron / Victory":"🟩","League":"🟦","Routes":"🛣️","Services":"🏪"};
const typeEmoji={street:"🏠",transport:"🚆",utility:"💡"};
const original=[["Mediterranean Avenue","Brown",60,30,50,[2,10,30,90,160,250]],["Baltic Avenue","Brown",60,30,50,[4,20,60,180,320,450]],["Reading Railroad","Railroad",200,100,0,[25,50,100,200,200,200],"transport"],["Oriental Avenue","Light Blue",100,50,50,[6,30,90,270,400,550]],["Vermont Avenue","Light Blue",100,50,50,[6,30,90,270,400,550]],["Connecticut Avenue","Light Blue",120,60,50,[8,40,100,300,450,600]],["St. Charles Place","Pink",140,70,100,[10,50,150,450,625,750]],["Electric Company","Utility",150,75,0,[0,0,0,0,0,0],"utility"],["States Avenue","Pink",140,70,100,[10,50,150,450,625,750]],["Virginia Avenue","Pink",160,80,100,[12,60,180,500,700,900]],["Pennsylvania Railroad","Railroad",200,100,0,[25,50,100,200,200,200],"transport"],["St. James Place","Orange",180,90,100,[14,70,200,550,750,950]],["Tennessee Avenue","Orange",180,90,100,[14,70,200,550,750,950]],["New York Avenue","Orange",200,100,100,[16,80,220,600,800,1000]],["Kentucky Avenue","Red",220,110,150,[18,90,250,700,875,1050]],["Indiana Avenue","Red",220,110,150,[18,90,250,700,875,1050]],["Illinois Avenue","Red",240,120,150,[20,100,300,750,925,1100]],["B&O Railroad","Railroad",200,100,0,[25,50,100,200,200,200],"transport"],["Atlantic Avenue","Yellow",260,130,150,[22,110,330,800,975,1150]],["Ventnor Avenue","Yellow",260,130,150,[22,110,330,800,975,1150]],["Water Works","Utility",150,75,0,[0,0,0,0,0,0],"utility"],["Marvin Gardens","Yellow",280,140,150,[24,120,360,850,1025,1200]],["Pacific Avenue","Green",300,150,200,[26,130,390,900,1100,1275]],["North Carolina Avenue","Green",300,150,200,[26,130,390,900,1100,1275]],["Pennsylvania Avenue","Green",320,160,200,[28,150,450,1000,1200,1400]],["Short Line","Railroad",200,100,0,[25,50,100,200,200,200],"transport"],["Park Place","Dark Blue",350,175,200,[35,175,500,1100,1300,1500]],["Boardwalk","Dark Blue",400,200,200,[50,200,600,1400,1700,2000]]];
const kanto=[["Pallet Town","Pallet / Viridian",60,30,50,[2,10,30,90,160,250]],["Viridian Forest","Pallet / Viridian",60,30,50,[4,20,60,180,320,450]],["Route 2","Routes",200,100,0,[25,50,100,200,200,200],"transport"],["Pewter City","Pewter / Cerulean",100,50,50,[6,30,90,270,400,550]],["Mt. Moon","Pewter / Cerulean",100,50,50,[6,30,90,270,400,550]],["Cerulean City","Pewter / Cerulean",120,60,50,[8,40,100,300,450,600]],["Vermilion City","Vermilion Route",140,70,100,[10,50,150,450,625,750]],["Pokémon Center","Services",150,75,0,[0,0,0,0,0,0],"utility"],["S.S. Anne","Vermilion Route",140,70,100,[10,50,150,450,625,750]],["Rock Tunnel","Vermilion Route",160,80,100,[12,60,180,500,700,900]],["Route 11","Routes",200,100,0,[25,50,100,200,200,200],"transport"],["Lavender Town","Lavender / Celadon",180,90,100,[14,70,200,550,750,950]],["Celadon City","Lavender / Celadon",180,90,100,[14,70,200,550,750,950]],["Game Corner","Lavender / Celadon",200,100,100,[16,80,220,600,800,1000]],["Cycling Road","Fuchsia Route",220,110,150,[18,90,250,700,875,1050]],["Fuchsia City","Fuchsia Route",220,110,150,[18,90,250,700,875,1050]],["Safari Zone","Fuchsia Route",240,120,150,[20,100,300,750,925,1100]],["Route 17","Routes",200,100,0,[25,50,100,200,200,200],"transport"],["Seafoam Islands","Island Arc",260,130,150,[22,110,330,800,975,1150]],["Cinnabar Island","Island Arc",260,130,150,[22,110,330,800,975,1150]],["Poké Mart","Services",150,75,0,[0,0,0,0,0,0],"utility"],["Pokémon Mansion","Island Arc",280,140,150,[24,120,360,850,1025,1200]],["Saffron City","Saffron / Victory",300,150,200,[26,130,390,900,1100,1275]],["Silph Co.","Saffron / Victory",300,150,200,[26,130,390,900,1100,1275]],["Victory Road","Saffron / Victory",320,160,200,[28,150,450,1000,1200,1400]],["Route 23","Routes",200,100,0,[25,50,100,200,200,200],"transport"],["Indigo Plateau","League",350,175,200,[35,175,500,1100,1300,1500]],["Pokémon League","League",400,200,200,[50,200,600,1400,1700,2000]]];
const PRESETS={original:{name:"Original Monopoly",data:original},kanto:{name:"Kanto Region",data:kanto}};
const CARD_ACTIONS=[{t:"Bank pays player",d:"Collect from bank.",amount:50,mode:"bankToPlayer",cat:"Special"},{t:"Bank pays player",d:"Collect from bank.",amount:100,mode:"bankToPlayer",cat:"Special"},{t:"Bank pays player",d:"Collect from bank.",amount:200,mode:"bankToPlayer",cat:"Pass GO"},{t:"Player pays bank",d:"Pay fee/tax.",amount:50,mode:"playerToBank",cat:"Fee"},{t:"Player pays bank",d:"Pay fee/tax.",amount:100,mode:"playerToBank",cat:"Fee"},{t:"Pay each player",d:"Pay every other player.",amount:50,mode:"payEach",cat:"Players"},{t:"Collect from each player",d:"Collect from every other player.",amount:50,mode:"collectEach",cat:"Players"},{t:"Go to Jail",d:"Log jail status.",amount:0,mode:"status",cat:"Status"},{t:"Get Out of Jail Free",d:"Add special card to player wallet.",amount:0,mode:"jailcard",cat:"Status"},{t:"Street repairs",d:"Pay $40/house and $115/hotel.",amount:0,mode:"repairsA",cat:"Repairs"},{t:"Major repairs",d:"Pay $25/house and $100/hotel.",amount:0,mode:"repairsB",cat:"Repairs"},{t:"Move token",d:"Movement-only action.",amount:0,mode:"status",cat:"Movement"}];
let state=load(),sb=null,cloud=null,channel=null,applyingRemote=false;
function propsFrom(data){return data.map((p,i)=>({id:"prop_"+i,name:p[0],group:p[1],price:p[2],mortgage:p[3],buildCost:p[4],rents:p[5],type:p[6]||"street",ownerId:"",houses:0,mortgaged:false}))}function fresh(key="original",players=[]){return{boardKey:key,boardName:PRESETS[key].name,players,properties:propsFrom(PRESETS[key].data),transactions:[]}}function migrate(x){if(!x||!x.players||!x.properties)return fresh();x.boardKey=x.boardKey||"original";x.boardName=x.boardName||PRESETS[x.boardKey]?.name||"Original Monopoly";x.transactions=x.transactions||[];x.players.forEach(p=>p.specialCards=p.specialCards||[]);x.properties.forEach(p=>{p.type=p.type||"street";p.mortgage=p.mortgage||Math.floor(Number(p.price||0)/2);p.buildCost=p.buildCost??0;p.rents=p.rents||[0,0,0,0,0,0]});return x}function load(){try{return migrate(JSON.parse(localStorage.getItem(KEY))||JSON.parse(localStorage.getItem("monopolyTracker.v5"))||JSON.parse(localStorage.getItem("monopolyTracker.v4")))}catch{return fresh()}}
function localSave(){localStorage.setItem(KEY,JSON.stringify(state))}async function save(){localSave();render();if(cloud&&!applyingRemote)await pushCloud(true)}function id(p){return p+"_"+Math.random().toString(36).slice(2,9)}function esc(s){return String(s||"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}function cash(n){return "$"+Number(n||0).toLocaleString()}function playerName(i){return state.players.find(p=>p.id===i)?.name||"Bank"}function rent(p){return !p||p.mortgaged?0:Number(p.rents[Math.max(0,Math.min(5,Number(p.houses||0)))]||0)}function groupIcon(p){return groupEmoji[p.group]||typeEmoji[p.type]||"🏠"}function unowned(){return state.properties.filter(p=>!p.ownerId)}
function tx(t){let entry={id:id("tx"),createdAt:new Date().toISOString(),...t};state.transactions.unshift(entry);state.transactions=state.transactions.slice(0,200);insertCloudLog(entry);return entry}async function insertCloudLog(e){if(!cloud||applyingRemote)return;try{await sb.from("game_logs").insert({game_code:cloud.code,action_type:e.type||"action",title:e.note||e.type,detail:`${playerName(e.fromId)} → ${playerName(e.toId)} · ${cash(e.amount)}`,amount:Number(e.amount||0),payload:e})}catch(err){console.warn(err)}}function adjust(pid,d){let p=state.players.find(x=>x.id===pid);if(p)p.cash=Number(p.cash||0)+Number(d||0)}function transfer(f,t,a,n,type="transfer"){a=Number(a||0);if(!a||a<0)return alert("Enter a valid amount."),false;if(f)adjust(f,-a);if(t)adjust(t,a);tx({type,fromId:f,toId:t,amount:a,note:n||type});save();return true}
function setupPresets(){presetSelect.innerHTML=Object.entries(PRESETS).map(([k,p])=>`<option value="${k}" ${state.boardKey===k?'selected':''}>${esc(p.name)}</option>`).join("")}function applyPreset(){let key=presetSelect.value;if(!confirm(`Use ${PRESETS[key].name}? Properties reset; players/cash stay.`))return;let players=state.players;state=fresh(key,players);tx({type:"board",fromId:"",toId:"",amount:0,note:"Board changed to "+state.boardName});save()}
function opts(sel,bank=false){let e=document.getElementById(sel),cur=e?.value;if(!e)return;e.innerHTML=bank?'<option value="">Bank</option>':"";state.players.forEach(p=>e.innerHTML+=`<option value="${p.id}">${esc(p.name)} — ${cash(p.cash)}</option>`);if([...e.options].some(o=>o.value===cur))e.value=cur}function propOpts(){let cur=rentProp.value;rentProp.innerHTML="";state.properties.forEach(p=>rentProp.innerHTML+=`<option value="${p.id}">${groupIcon(p)} ${esc(p.name)} — ${p.ownerId?esc(playerName(p.ownerId)):"Unowned"}${p.mortgaged?" — Mortgaged":""}</option>`);if([...rentProp.options].some(o=>o.value===cur))rentProp.value=cur;let bcur=buyProperty.value;buyProperty.innerHTML="";unowned().forEach(p=>buyProperty.innerHTML+=`<option value="${p.id}">${groupIcon(p)} ${esc(p.name)} — ${cash(p.price)}</option>`);if([...buyProperty.options].some(o=>o.value===bcur))buyProperty.value=bcur}
function addPlayer(){let name=newName.value.trim(),c=Number(newCash.value||1500);if(!name)return alert("Enter a player name.");state.players.push({id:id("player"),name,cash:c,specialCards:[]});tx({type:"player",fromId:"",toId:"",amount:0,note:"Added player "+name});newName.value="";save()}function removePlayer(pid){if(!confirm("Remove this player? Their properties become unowned."))return;let old=playerName(pid);state.players=state.players.filter(p=>p.id!==pid);state.properties.forEach(p=>{if(p.ownerId===pid)p.ownerId=""});tx({type:"admin",fromId:"",toId:"",amount:0,note:"Removed "+old});save()}function setCash(pid){let p=state.players.find(x=>x.id===pid),v=prompt("Set cash for "+p.name,p.cash);if(v===null)return;let old=p.cash;p.cash=Number(v||0);tx({type:"cash_set",fromId:"",toId:pid,amount:p.cash-old,note:"Set cash for "+p.name});save()}
function buySelectedProperty(){let p=state.properties.find(x=>x.id===buyProperty.value),buyer=state.players.find(x=>x.id===buyPlayer.value);if(!p||!buyer)return alert("Choose player and property.");buyer.cash-=Number(p.price||0);p.ownerId=buyer.id;tx({type:"buy",fromId:buyer.id,toId:"",amount:p.price,note:`${buyer.name} bought ${p.name}`});save()}function assignSelectedProperty(){let p=state.properties.find(x=>x.id===buyProperty.value),buyer=state.players.find(x=>x.id===buyPlayer.value);if(!p||!buyer)return alert("Choose player and property.");p.ownerId=buyer.id;tx({type:"assign",fromId:"",toId:buyer.id,amount:0,note:`${p.name} assigned to ${buyer.name}`});save()}function buyPreview(){let p=state.properties.find(x=>x.id===buyProperty.value),buyer=state.players.find(x=>x.id===buyPlayer.value);buyPreviewEl.innerHTML=p?`<strong>${groupIcon(p)} ${esc(p.name)}</strong><br><span class="mini">${esc(p.group)} · Price ${cash(p.price)} · Mortgage ${cash(p.mortgage)} · Build ${p.buildCost?cash(p.buildCost):"N/A"}</span>${buyer?`<br><strong>${esc(buyer.name)}</strong> after purchase: <strong>${cash(Number(buyer.cash)-Number(p.price))}</strong>`:""}`:'<span class="muted">No unowned properties.</span>'}
function rentPreview(){let p=state.properties.find(x=>x.id===rentProp.value),payer=state.players.find(x=>x.id===rentPayer.value);if(!p)return rentBox.innerHTML='<span class="muted">Choose a property.</span>';let owner=state.players.find(x=>x.id===p.ownerId),r=rent(p);if(!owner)return rentBox.innerHTML=`<strong>${groupIcon(p)} ${esc(p.name)}</strong><br><span class="muted">Unowned. Price ${cash(p.price)}.</span>`;if(payer&&payer.id===owner.id)return rentBox.innerHTML=`<strong>${groupIcon(p)} ${esc(p.name)}</strong><br><span class="muted">Payer owns this property.</span>`;if(p.mortgaged)return rentBox.innerHTML=`<strong>${groupIcon(p)} ${esc(p.name)}</strong><br><span class="bad">🏦 Mortgaged. Rent ${cash(0)}.</span>`;rentBox.innerHTML=`<strong>${groupIcon(p)} ${esc(p.name)}</strong><br>Owner: <strong>${esc(owner.name)}</strong><br>Level: <strong>${p.houses===5?"Hotel":p.houses+" house(s)"}</strong><br>Rent due: <strong>${cash(r)}</strong>`}function payRent(){let p=state.properties.find(x=>x.id===rentProp.value),payer=state.players.find(x=>x.id===rentPayer.value);if(!p||!payer)return alert("Choose payer and property.");if(!p.ownerId)return alert("Unowned property.");if(p.ownerId===payer.id)return alert("Payer owns this property.");let r=rent(p);if(!r)return alert("Rent is zero.");transfer(payer.id,p.ownerId,r,"Rent for "+p.name,"rent")}
function payFromPlayer(pid){let to=prompt("Pay whom? Type player name, or BANK");if(!to)return;let amount=Number(prompt("Amount?",50)||0);if(!amount)return;let p=state.players.find(x=>x.id===pid);if(to.trim().toLowerCase()==="bank")return transfer(pid,"",amount,p.name+" paid bank","player_pay_bank");let target=state.players.find(x=>x.name.toLowerCase()===to.trim().toLowerCase());if(!target)return alert("Player not found.");transfer(pid,target.id,amount,p.name+" paid "+target.name,"player_pay_player")}function receiveForPlayer(pid){let amount=Number(prompt("Receive how much from bank?",50)||0);if(amount)transfer("",pid,amount,playerName(pid)+" received from bank","bank_pay_player")}function mortgageProp(pid){let p=state.properties.find(x=>x.id===pid);if(!p||!p.ownerId)return alert("Assign owner first.");if(p.mortgaged)return alert("Already mortgaged.");p.mortgaged=true;adjust(p.ownerId,p.mortgage);tx({type:"mortgage",fromId:"",toId:p.ownerId,amount:p.mortgage,note:p.name+" mortgaged"});save()}function unmortgageProp(pid){let p=state.properties.find(x=>x.id===pid);if(!p||!p.ownerId)return alert("Assign owner first.");if(!p.mortgaged)return alert("Not mortgaged.");let cost=Math.ceil(p.mortgage*1.1);p.mortgaged=false;adjust(p.ownerId,-cost);tx({type:"unmortgage",fromId:p.ownerId,toId:"",amount:cost,note:p.name+" unmortgaged"});save()}function setLevel(pid,v){let p=state.properties.find(x=>x.id===pid);p.houses=Number(v);tx({type:"property_level",fromId:"",toId:p.ownerId,amount:0,note:p.name+" set to "+(p.houses===5?"Hotel":p.houses+" house(s)")});save()}function setOwner(pid,owner){let p=state.properties.find(x=>x.id===pid);p.ownerId=owner;tx({type:"property_owner",fromId:"",toId:owner,amount:0,note:p.name+" assigned to "+playerName(owner)});save()}
function cardOptions(){cardAction.innerHTML=CARD_ACTIONS.map((c,i)=>`<option value="${i}">${esc(c.cat)} — ${esc(c.t)} ${c.amount?cash(c.amount):""}</option>`).join("")}function previewCard(){let c=CARD_ACTIONS[Number(cardAction.value||0)];cardPreview.innerHTML=`<strong>${esc(c.t)}</strong><br><span class="mini">${esc(c.cat)}</span><p>${esc(c.d)}</p>${c.amount?`<strong>${cash(c.amount)}</strong>`:""}`}
function repairAmount(player,mode){let owned=state.properties.filter(p=>p.ownerId===player.id),houses=owned.reduce((s,p)=>s+(p.houses>0&&p.houses<5?p.houses:0),0),hotels=owned.filter(p=>p.houses===5).length;return mode==="repairsA"?houses*40+hotels*115:houses*25+hotels*100}function applyCard(){let c=CARD_ACTIONS[Number(cardAction.value||0)],p=state.players.find(x=>x.id===cardPlayer.value);if(!c||!p)return alert("Choose player and action.");let total=0;if(c.mode==="bankToPlayer"){adjust(p.id,c.amount);total=c.amount}else if(c.mode==="playerToBank"){adjust(p.id,-c.amount);total=c.amount}else if(c.mode==="payEach"){state.players.filter(x=>x.id!==p.id).forEach(o=>{adjust(p.id,-c.amount);adjust(o.id,c.amount);total+=c.amount})}else if(c.mode==="collectEach"){state.players.filter(x=>x.id!==p.id).forEach(o=>{adjust(o.id,-c.amount);adjust(p.id,c.amount);total+=c.amount})}else if(c.mode==="repairsA"||c.mode==="repairsB"){total=repairAmount(p,c.mode);adjust(p.id,-total)}else if(c.mode==="jailcard"){p.specialCards.push("Get Out of Jail Free 🎟️")}tx({type:"card",fromId:c.mode.includes("pay")||c.mode.includes("repair")?p.id:"",toId:c.mode.includes("collect")||c.mode==="bankToPlayer"?p.id:"",amount:total,note:`${p.name}: ${c.t}`});save()}
async function connectCloud(){let url=sbUrl.value.trim(),key=sbKey.value.trim(),code=gameCode.value.trim().toUpperCase();if(!url||!key||!code)return alert("Enter Supabase URL, key and game code.");sb=supabase.createClient(url,key);cloud={url,key,code};localStorage.setItem(CLOUDKEY,JSON.stringify(cloud));let {data,error}=await sb.from("games").select("*").eq("code",code).maybeSingle();if(error)return cloudMsg.textContent=error.message;if(data?.state){applyingRemote=true;state=migrate(data.state);localSave();applyingRemote=false}else await pushCloud(true);subscribeCloud();render()}async function pushCloud(silent=false){if(!cloud)return !silent&&alert("Connect cloud first.");let {error}=await sb.from("games").upsert({code:cloud.code,state,board_key:state.boardKey,board_name:state.boardName,updated_at:new Date().toISOString()});if(error&&!silent)alert(error.message);if(!error&&!silent)cloudMsg.textContent="Pushed."}async function pullCloud(){if(!cloud)return alert("Connect cloud first.");let {data,error}=await sb.from("games").select("*").eq("code",cloud.code).maybeSingle();if(error)return alert(error.message);if(data?.state){applyingRemote=true;state=migrate(data.state);localSave();applyingRemote=false;render()}}function subscribeCloud(){if(channel)sb.removeChannel(channel);channel=sb.channel("game-"+cloud.code).on("postgres_changes",{event:"UPDATE",schema:"public",table:"games",filter:`code=eq.${cloud.code}`},payload=>{if(payload.new?.state){applyingRemote=true;state=migrate(payload.new.state);localSave();applyingRemote=false;render()}}).subscribe()}function disconnectCloud(){if(channel&&sb)sb.removeChannel(channel);channel=null;sb=null;cloud=null;localStorage.removeItem(CLOUDKEY);render()}function restoreCloudInputs(){try{let c=JSON.parse(localStorage.getItem(CLOUDKEY));if(c){sbUrl.value=c.url||"";sbKey.value=c.key||"";gameCode.value=c.code||""}}catch{}}
function exportGame(){let text=JSON.stringify(state,null,2),blob=new Blob([text],{type:"application/json"}),url=URL.createObjectURL(blob),a=document.createElement("a");a.href=url;a.download="monopoly-tracker-game.json";a.click();URL.revokeObjectURL(url);json.value=text}async function copyGame(){let text=JSON.stringify(state,null,2);json.value=text;await navigator.clipboard.writeText(text);alert("Copied game JSON.")}function importGame(){try{state=migrate(JSON.parse(importText.value.trim()));tx({type:"import",fromId:"",toId:"",amount:0,note:"Imported game JSON"});save()}catch(e){alert("Import failed: "+e.message)}}function resetAll(){if(confirm("Reset whole game?")){state=fresh(state.boardKey||"original");save()}}
function view(n){document.querySelectorAll(".view").forEach(v=>v.classList.add("hidden"));document.getElementById("v-"+n).classList.remove("hidden");document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));document.getElementById("t-"+n).classList.add("active");render()}function rentGrid(p){let labels=["Base","1 house","2 houses","3 houses","4 houses","Hotel"];return `<details><summary>Rent / build details</summary><div class="rent-grid">${labels.map((l,i)=>`<div>${l}</div><div>${cash(p.rents[i])}</div>`).join("")}<div>Build</div><div>${p.buildCost?cash(p.buildCost):"N/A"}</div><div>Mortgage</div><div>${cash(p.mortgage)}</div><div>Unmortgage</div><div>${cash(Math.ceil(p.mortgage*1.1))}</div></div></details>`}
function render(){setupPresets();boardLabel.textContent=`${state.boardName} · ${state.properties.length} properties`;cloudLabel.innerHTML=cloud?`<span class="status-dot on"></span>Cloud: ${esc(cloud.code)}`:`<span class="status-dot"></span>Local only`;cloudMsg&&(cloudMsg.textContent=cloud?`Connected to ${cloud.code}`:"Not connected");opts("buyPlayer");opts("rentPayer");opts("cardPlayer");propOpts();cardOptions();previewCard();buyPreview();gamePlayers.innerHTML=state.players.length?state.players.map(p=>{let owned=state.properties.filter(x=>x.ownerId===p.id);return `<div class="card"><div><div class="name">${esc(p.name)}</div><div class="mini">${owned.length} props · ${p.specialCards?.length||0} cards</div><div class="actions"><button class="secondary tiny" onclick="payFromPlayer('${p.id}')">Pay</button><button class="secondary tiny" onclick="receiveForPlayer('${p.id}')">Receive</button></div></div><div class="cash">${cash(p.cash)}</div></div>`}).join(""):'<div class="empty">Add players in the Players tab.</div>';playerWallets.innerHTML=state.players.length?state.players.map(p=>{let owned=state.properties.filter(x=>x.ownerId===p.id);return `<div class="prop"><div class="section-head"><div><div class="name">${esc(p.name)}</div><div class="cash">${cash(p.cash)}</div></div><button class="danger tiny" onclick="removePlayer('${p.id}')">Remove</button></div><div class="actions"><button class="secondary tiny" onclick="payFromPlayer('${p.id}')">Pay</button><button class="secondary tiny" onclick="receiveForPlayer('${p.id}')">Receive</button><button class="secondary tiny" onclick="setCash('${p.id}')">Set Cash</button></div><details open><summary>Properties (${owned.length})</summary>${owned.length?owned.map(x=>`<div class="mini">${groupIcon(x)} ${esc(x.name)} · ${x.mortgaged?'🏦 ':''}${cash(rent(x))}</div>`).join(""):"<div class='mini'>None yet</div>"}</details><details><summary>Special Cards (${p.specialCards?.length||0})</summary>${(p.specialCards||[]).length?p.specialCards.map(c=>`<div class="mini">🎟️ ${esc(c)}</div>`).join(""):"<div class='mini'>None</div>"}</details></div>`}).join(""):'<div class="empty">No players yet.</div>';let q=(search?.value||"").toLowerCase(),filtered=state.properties.filter(p=>(p.name+p.group+playerName(p.ownerId)+(p.mortgaged?"mortgaged":"")).toLowerCase().includes(q));props.innerHTML=filtered.map(p=>{let owner=state.players.find(x=>x.id===p.ownerId);return `<div class="prop"><div class="prophead"><div><div class="name">${groupIcon(p)} ${esc(p.name)}</div><div class="mini">${esc(p.group)} · Price ${cash(p.price)} · Rent ${cash(rent(p))}</div></div><div class="${p.mortgaged?'bad':owner?'good':'muted'}">${p.mortgaged?'🏦 Mortgaged':owner?'✅ '+esc(owner.name):'Unowned'}</div></div><span class="pill">Mortgage ${cash(p.mortgage)}</span><span class="pill">Level ${p.houses===5?'Hotel':p.houses}</span><label>Owner</label><select onchange="setOwner('${p.id}',this.value)"><option value="">Unowned</option>${state.players.map(x=>`<option value="${x.id}" ${x.id===p.ownerId?'selected':''}>${esc(x.name)}</option>`).join('')}</select><div class="row"><div><label>House / Hotel</label><select onchange="setLevel('${p.id}',this.value)">${[0,1,2,3,4,5].map(n=>`<option value="${n}" ${p.houses===n?'selected':''}>${n===5?'Hotel':n}</option>`).join('')}</select></div></div><div class="actions"><button class="secondary tiny" onclick="mortgageProp('${p.id}')">Mortgage +${cash(p.mortgage)}</button><button class="secondary tiny" onclick="unmortgageProp('${p.id}')">Unmortgage -${cash(Math.ceil(p.mortgage*1.1))}</button></div>${rentGrid(p)}</div>`}).join("")||'<div class="empty">No matching properties.</div>';log.innerHTML=state.transactions.length?state.transactions.slice(0,35).map(x=>`<div class="prop"><strong>${esc(x.note||x.type)}</strong><br><span class="mini">${playerName(x.fromId)} → ${playerName(x.toId)} · ${cash(x.amount)} · ${new Date(x.createdAt).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</span></div>`).join(""):'<div class="empty">No transactions yet.</div>';json&&(json.value=JSON.stringify(state,null,2));rentPreview()}
const buyPreviewEl=document.getElementById('buyPreview');document.getElementById('buyProperty').addEventListener('change',buyPreview);document.getElementById('buyPlayer').addEventListener('change',buyPreview);restoreCloudInputs();render();
</script></body></html>
